name: Deb Release
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Get Version
        id: get_version
        run: echo ::set-output name=VERSION::$(cat VERSION)
        
      - name: Installing build dependencies
        run: |
          sudo apt install -y debhelper python3 python3.8-minimal python3-pip python3-setuptools gettext build-essential patchelf librsvg2-dev desktop-file-utils libgdk-pixbuf2.0-dev fakeroot strace ninja-build meson
      
      - name: Build debian package
        run: dpkg-buildpackage
      
      - name: Rename
        run: |
          mv ../com.usebottles.bottles*.deb com.usebottles.bottles-unstable.deb
        
      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          draft: false
          prerelease: false
          automatic_release_tag: unstable
          title: Unstable build
          files: |
            Bottles-*-x86_64.AppImage*
            com.usebottles.bottles-unstable.deb
